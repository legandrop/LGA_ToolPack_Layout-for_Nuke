<svg xmlns="http://www.w3.org/2000/svg" width="520" height="92" viewBox="0 0 520 92" role="img" aria-label="Arrange Nodes shortcuts">
  <text x="0" y="18" fill="#8a8a8a" font-size="16" font-family="Segoe UI, Arial, Helvetica, sans-serif">
    <tspan font-weight="700">Shortcuts:</tspan>
  </text>
  <text x="0" y="42" fill="#8a8a8a" font-size="16" font-family="Segoe UI, Arial, Helvetica, sans-serif">
    <tspan>Algorithm 1: </tspan>
    <tspan font-weight="700" font-style="italic">Ctrl + 5</tspan>
  </text>
  <text x="0" y="66" fill="#8a8a8a" font-size="16" font-family="Segoe UI, Arial, Helvetica, sans-serif">
    <tspan>Algorithm 2: </tspan>
    <tspan font-weight="700" font-style="italic">Ctrl + Alt + 5</tspan>
  </text>
  <text x="0" y="90" fill="#8a8a8a" font-size="16" font-family="Segoe UI, Arial, Helvetica, sans-serif">* There are two different algorithms, and one may work better than the other depending on the case.</text>
</svg>
