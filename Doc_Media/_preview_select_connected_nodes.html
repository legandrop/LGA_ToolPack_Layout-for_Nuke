<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Preview Select Connected Nodes</title>
  <style>
    body {
      margin: 0;
      background: #1e1e1e;
      color: #8a8a8a;
      font-family: Arial, Helvetica, sans-serif;
    }
    .wrap {
      width: 760px;
      padding: 20px;
    }
    .block {
      margin: 0 0 24px;
    }
    .label {
      font-size: 12px;
      line-height: 1.2;
      color: #6f6f6f;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .head {
      font-size: 16px;
      line-height: 1.2;
      margin-bottom: 10px;
    }
    .head strong {
      font-weight: 700;
    }
    .line {
      font-size: 16px;
      line-height: 1.35;
      font-style: italic;
      font-weight: 700;
      margin: 10px 0;
    }
    .meta-note {
      font-size: 14px;
      line-height: 1.35;
      font-style: italic;
      color: #aaaaaa;
      margin: 8px 0 18px;
    }
    img {
      display: block;
      margin-top: 6px;
    }
    .divider {
      height: 1px;
      background: #303030;
      margin: 18px 0 20px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="block">
      <div class="label">Referencia aprobada</div>
      <img src="./select_connected_nodes_shortcuts.svg" alt="reference" width="345" height="123">
    </div>
    <div class="block">
      <div class="label">Push Nodes</div>
      <img src="./push_nodes_shortcuts.svg" alt="push" width="360" height="105">
    </div>
    <div class="block">
      <div class="label">Pull Nodes</div>
      <img src="./pull_nodes_shortcuts.svg" alt="pull" width="420" height="105">
    </div>
  </div>
</body>
</html>
