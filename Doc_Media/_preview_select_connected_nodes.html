<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Preview Select Connected Nodes</title>
  <style>
    body {
      margin: 0;
      background: #1e1e1e;
      color: #8a8a8a;
      font-family: Arial, Helvetica, sans-serif;
    }
    .wrap {
      width: 520px;
      padding: 20px;
    }
    .head {
      font-size: 16px;
      line-height: 1.2;
      margin-bottom: 10px;
    }
    .head strong {
      font-weight: 700;
    }
    .line {
      font-size: 16px;
      line-height: 1.35;
      font-style: italic;
      font-weight: 700;
      margin: 10px 0;
    }
    .meta-note {
      font-size: 14px;
      line-height: 1.35;
      font-style: italic;
      color: #aaaaaa;
      margin: 8px 0 18px;
    }
    img {
      display: block;
      width: 345px;
      height: 123px;
      margin-top: 6px;
    }
    .divider {
      height: 1px;
      background: #303030;
      margin: 18px 0 20px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">
      <div class="head"><strong>Shortcuts</strong> (usando el teclado numérico):</div>
      <div class="line">Meta + ↓ (2)</div>
      <div class="line">Meta + ↑ (8)</div>
      <div class="line">Meta + ← (4)</div>
      <div class="line">Meta + → (6)</div>
      <div class="meta-note">Meta es la bandera en Windows o la manzana en macOS.</div>
    </div>

    <div class="divider"></div>

    <img src="./select_connected_nodes_shortcuts.svg" alt="preview">
  </div>
</body>
</html>
