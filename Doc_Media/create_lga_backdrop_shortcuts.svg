<svg xmlns="http://www.w3.org/2000/svg" width="560" height="68" viewBox="0 0 560 68" role="img" aria-label="Create LGA Backdrop shortcuts">
  <text x="0" y="18" fill="#8a8a8a" font-size="16" font-weight="700" font-family="Segoe UI, Arial, Helvetica, sans-serif">Shortcuts:</text>
  <text x="0" y="42" fill="#8a8a8a" font-size="16" font-family="Segoe UI, Arial, Helvetica, sans-serif">
    <tspan font-weight="700" font-style="italic">Shift + B</tspan>
    <tspan> crea un nuevo LGA_Backdrop</tspan>
  </text>
  <text x="0" y="66" fill="#8a8a8a" font-size="16" font-family="Segoe UI, Arial, Helvetica, sans-serif">
    <tspan font-weight="700" font-style="italic">Ctrl + B</tspan>
    <tspan> reemplaza backdrops seleccionados (o todos) por LGA_Backdrop</tspan>
  </text>
</svg>
