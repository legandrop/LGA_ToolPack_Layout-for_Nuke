<svg xmlns="http://www.w3.org/2000/svg" width="570" height="68" viewBox="0 0 570 68" role="img" aria-label="Distribute Nodes shortcuts">
  <text x="0" y="18" fill="#8a8a8a" font-size="16" font-family="Segoe UI, Arial, Helvetica, sans-serif">
    <tspan font-weight="700">Shortcuts</tspan>
    <tspan> (usando el teclado num&#233;rico):</tspan>
  </text>
  <text x="0" y="42" fill="#8a8a8a" font-size="16" font-family="Segoe UI, Arial, Helvetica, sans-serif">
    <tspan font-weight="700" font-style="italic">Ctrl + 0</tspan>
    <tspan> Horizontal </tspan>
    <tspan font-weight="400">(El 0 es m&#225;s ancho en el teclado num&#233;rico que el punto)</tspan>
  </text>
  <text x="0" y="66" fill="#8a8a8a" font-size="16" font-family="Segoe UI, Arial, Helvetica, sans-serif">
    <tspan font-weight="700" font-style="italic">Ctrl + .</tspan>
    <tspan> Vertical</tspan>
  </text>
</svg>
